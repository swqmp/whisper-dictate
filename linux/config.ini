# WhisperDictate Linux Configuration
#
# backend options: local, cloud_xai
#   local      — OpenAI whisper Python package (offline, free, no key needed)
#   cloud_xai  — xAI Grok STT API ($0.10/hr batch, faster + better accuracy)
#
# model options (local backend only): base, small
#   base  — faster, ~140 MB download, good accuracy
#   small — slower, ~465 MB download, better accuracy
#
# For cloud_xai backend, store key at:
#   ~/.config/whisper-dictate/xai-api-key  (chmod 600)
# or set the XAI_API_KEY environment variable.

[whisper]
backend = local
model = base
